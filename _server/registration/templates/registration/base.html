{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Manager</title>
  <style>
    :root{
      --bg: #0d0f13;
      --bg-light: #171a20;
      --border: #2a2f36;
      --text: #e2e8f0;
      --text-muted: #9aa3b2;
      --accent: #4f8cff;
    }

    html,body{height:100%;}
    body{
      margin:0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .auth-wrapper{
      width:100%;
      max-width:420px;
      background:#1f2023;
      border:1px solid #333;
      border-radius:10px;
      padding:20px;
      box-sizing:border-box;
    }

    .auth-header{
      margin:0 0 12px 0;
      font-size:1.2rem;
      font-weight:600;
      color:var(--text);
    }

    .auth-form label{ 
      display:flex;
      flex-direction:column;
      color:var(--text-muted);
      font-size:0.9rem; margin-bottom:10px }
    .auth-form input[type="email"], .auth-form input[type="password"]{
      margin-top:6px;
      padding:8px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--bg-light);
      color:var(--text);
    }

    .auth-actions{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top:14px 
    }

    .auth-actions button{
      background:var(--accent);
      border:none; color:white;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer 
    }

    .auth-actions a{
      color:var(--text-muted);
      text-decoration:none 
    }

    .auth-note{
      margin-top:12px;
      color:var(--text-muted);
      font-size:0.9rem 
    }

    .auth-page-title{
      text-align:center;
      margin-bottom:14px;
      color:var(--text);
      font-size:1.35rem;
      font-weight:700 
    }
  </style>
</head>
<body>
  {% block content %}
  {% endblock %}
</body>
</html>
